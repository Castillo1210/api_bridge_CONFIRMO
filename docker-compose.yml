# D:\api-bridge\docker-compose.yml
version: '3.8'

services:
  api-bridge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-bridge
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      
      # Database (Cloud SQL via proxy o IP privada)
      - Database__Host=${DB_HOST:-/cloudsql/PROJECT:REGION:INSTANCE}
      - Database__Port=5432
      - Database__Name=${DB_NAME:-confirmo}
      - Database__User=${DB_USER}
      - Database__Password=${DB_PASSWORD}
      
      # JWT
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__AccessTokenHours=8
      - Jwt__RefreshTokenDays=30
      - Jwt__Issuer=confirmo-api
      - Jwt__Audience=confirmo-app
      
      # GCP Storage
      - Gcp__StorageBucket=${GCS_BUCKET}
      
      # Python Worker
      - PythonWorker__BaseUrl=http://python-worker:8081
      
      # Redis
      - Redis__ConnectionString=redis:6379
      
      # Finance Webhook
      - FinanceWebhook__Url=${FINANCE_WEBHOOK_URL}
      - FinanceWebhook__Secret=${FINANCE_WEBHOOK_SECRET}
      
      # Internal Secret (Worker ↔ API Bridge)
      - InternalSecret=${INTERNAL_SECRET}
      
      # SignalR
      - SignalR__EnableDetailedErrors=true
      
      # GCP Project
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - confirmo-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --notify-keyspace-events KEA
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - confirmo-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.2'

networks:
  confirmo-network:
    driver: bridge

volumes:
  redis-data: